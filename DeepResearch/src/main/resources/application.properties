spring.application.name=spring-ai-workshop
logging.level.org.springframework.ai=TRACE
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
spring.ai.mistralai.api-key=${MISTRAL_AI_API_KEY}
spring.ai.mistralai.chat.options.model=mistral-medium-latest
spring.ai.mistralai.chat.options.max-tokens=2048
TAVILY_API_KEY=${TAVILY_API_KEY}

# Debug-Logging für Tool-Aufrufe
logging.level.com.nicopuhlmann.springai.ragtoolsandagent=DEBUG

# MCP Client - Streamable HTTP Transport (ersetzt SSE seit MCP Spec 2025-11-25)
spring.ai.mcp.client.enabled=true
spring.ai.mcp.client.streamable-http.connections.server1.url=http://localhost:8081